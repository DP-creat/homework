<!DOCTYPE html>
<html class="page" lang="ru">

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="css/play.css">
  <script src="js/p5.min.js"></script>
  <script src="js/p5.sound.min.js"></script>
  <title>//play</title>
</head>

<body class="page__body">
  <div class="canvas-container"></div>


  <div class="ui-wrapper">
    <!-- ГЛАВНЫЙ КОНТЕЙНЕР-ТРАНСФОРМЕР -->
    <div id="ui-layer" class="state-0">
      <!-- Тот самый невидимый щит-пауза -->
      <div class="full-screen-clicker" onclick="togglePlay()"></div>



      <!-- БОКОВОЙ ХУД: Кнопки PREV/NEXT (появятся в state-2) -->


      <!-- ЦЕНТР: Главный круг (якорь 120px) -->
      <div class="main-circle-btn" onclick="handleMainClick()">
        <span id="main-btn-text"></span>
      </div>

      <!-- НИЖНИЙ ХУД: Название и Громкость (появятся в state-1) -->
      <div class="hud-bottom">

        <div class="hud-side">
          <button class="btn-side" onclick="prevTrack()">prev</button>
          <div id="track-info" onclick="togglePlay()"></div>
          <button class="btn-side" onclick="nextTrack()">next</button>
        </div>

        <div id="progress-container" onclick="seek(event)">
          <div id="progress-bar"></div>
        </div>

        <div class="time-meta">
          <span id="current-time">00:00</span>
          <div class="volume-mini">
            <span class="vol-label">VOL</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5"
              oninput="updateVolume(this.value)">
            <span id="vol-value">50%</span>
          </div>
          <span id="remaining-time">-00:00</span>
        </div>

      </div>

      <!-- ПРАВЫЙ ХУД: Плейлист и кнопки папок (появятся в state-2) -->
      <div id="playlist-side">
        <div class="playlist-meta">

          <button class="btn" id="shuffle-btn" onclick="toggleShuffle()">SHUFFLE: OFF</button>

          <button class="btn" onclick="syncSystemAudio()" id="sync-btn">SYNC_SYSTEM_AUDIO</button>

          <label for="file-input" class="btn">M P 3</label>
        </div>
        
        <div id="playlist">
          <!-- Сюда JS отрисует треки -->
           
        </div>
        <input type="text" id="playlist-search" placeholder="SEARCH" oninput="handleSearch(this.value)">
      </div>

      <!-- Скрытый инпут для файлов -->
      <input type="file" id="file-input" multiple onchange="loadFolder(event)" style="display:none;">

    </div>
  </div>
