<!DOCTYPE html>
<html class="page" lang="ru">

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="css/play.css">
  <script src="js/p5.min.js"></script>
  <script src="js/p5.sound.min.js"></script>
  <title>//play</title>
</head>

<body class="page__body">
  <div class="canvas-container"></div>
  <div class="ui-wrapper">
    <div id="ui-layer">
      <div id="track-info"></div>

      <!-- БЛОК ВРЕМЕНИ -->
      <div class="time-meta">
        <span id="current-time">00:00</span>
        <span id="remaining-time">-00:00</span>
      </div>

      <div id="progress-container" onclick="seek(event)">
        <div id="progress-bar"></div>
      </div>

      <!-- КНОПКИ -->
      <div class="controls">
        <button class="btn" onclick="prevTrack()">PREV</button>
        <button class="btn" id="play-btn" onclick="togglePlay()">PLAY</button>
        <button class="btn" onclick="nextTrack()">NEXT</button>
      </div>

      <!-- громкость -->
      <div class="volume-container">
        <span class="vol-label">VOL</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5"
          oninput="updateVolume(this.value)">
        <span id="vol-value">50%</span>
      </div>

      <!-- шафл -->
      <div class="controls" style="margin-top: 10px;">
        <button class="btn" id="shuffle-btn" onclick="toggleShuffle()">SHUFFLE: OFF</button>
        <label for="file-input">IMPORT FOLDER</label>
      </div>

      <!-- файлы -->
      <input type="file" id="file-input" multiple onchange="loadFolder(event)">

      <button class="btn" onclick="syncSystemAudio()" id="sync-btn">SYNC_SYSTEM_AUDIO</button>

      <div id="playlist"></div>
    </div>
  </div>
  <script src="./js/play.js"></script>
</body>

</html>
