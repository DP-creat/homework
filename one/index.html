<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="css/index.css" rel="stylesheet">
</head>

<body class="page__body">
  <canvas id="global-spark-canvas"></canvas>
  <div class="bento-container">

    <!-- Блок 1: Твое Стерео-Сердце (Канвас живет тут) -->
    <div class="bento-item card visualizer-card sunset-glow">
      <canvas id="defaultCanvas0"></canvas>
      <!-- Твоя центральная кнопка управления -->
      <div class="main-circle-btn" onclick="handleMainClick()">
        <span id="main-btn-text">PLAY</span>
      </div>
      <div class="card-label">CORE_RESONANCE</div>
    </div>

    <!-- Блок 2: ИИ-Ассистент (Чат) -->
    <div class="bento-item card ai-chat-card">
      <div class="card-header">AI_SELF_HELP</div>
      <div class="chat-display" id="chat-box">
        <p class="bot-msg">Система готова. Какой узел сегодня оптимизируем?</p>
      </div>
      <div class="chat-input-area">
        <input type="text" placeholder="WRITE_MESSAGE..." id="ai-input">
        <button class="send-btn">➔</button>
      </div>
    </div>

    <!-- Блок 3: Радио Концентрации -->
    <div class="bento-item card radio-card">
      <div class="card-label">FOCUS_RADIO</div>
      <div class="radio-controls">
        <button onclick="changeStation('LOFI')">LO-FI</button>
        <button onclick="changeStation('DEEP')">DEEP</button>
        <button onclick="changeStation('ZEN')">ZEN</button>
      </div>
    </div>
    <div class="bento-item card radio-card">
      <div class="card-label">FOCUS_RESONANCE</div>

      <div class="radio-grid">
        <button class="inner-btn card" onclick="changeStation(event, 'LOFI')">
          <span class="btn-title">LO-FI</span>
          <span class="btn-desc">CHILL_STEP</span>
        </button>

        <button class="inner-btn card" onclick="changeStation(event, 'DEEP')">
          <span class="btn-title">DEEP</span>
          <span class="btn-desc">TECH_FOCUS</span>
        </button>

        <button class="inner-btn card active" onclick="changeStation(event, 'ZEN')">
          <span class="btn-title">ZEN</span>
          <span class="btn-desc">AMBIENT_VOID</span>
        </button>
      </div>
    </div>

    <!-- Блок 4: Кликер / Ресурс дня -->
    <div class="bento-item card clicker-card" onclick="addEnergy()">
      <div class="card-label">BIO_RESOURCE</div>
      <div class="energy-value"><span id="energy-count">85</span>%</div>
      <div class="progress-mini">
        <div id="energy-bar" style="width: 85%"></div>
      </div>
    </div>
  </div>
  </main>

  <script src="js/main.js"></script>
</body>

</html>
